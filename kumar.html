<html>
<head>
<title>Create Account</title>
<style>
body{
    font-family:Arial;
    background:#eff2fc;
}
.container{
    width:400px;
    background:white;
    margin:auto;
    margin-top:50px;
    padding:30px;
    border-radius:15px;
}
h1{
    text-align:center;
}
p{
    text-align:center;
    color:gray;
}
label{
    font-weight:bold;
}
input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid lightgray;
    border-radius:5px;
}
button{
    width:100%;
    padding:12px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
}
.bottom{
    text-align:center;
    margin-top:15px;
}
a{
    color:blue;
    text-decoration:none;
}
</style>
</head>
<body>
<div class="Container">
    <center><img src="add-user.png" width="40" height="40"></center>
<center>
<h2>Create Account</h2>
</center>
<p>Sign up to get started</p>
<form>
<label>Full Name</label><br>
<input type="text" placeholder="👤 Enter your full name">
<label>Email</label><br>
<input type="email" placeholder="📧 Enter your email">
<label>Password</label><br>
<input type="password" placeholder="🔒Create a password                                                             👁️‍🗨️">
<label>Confirm Password</label><br>
<input type="password" placeholder="🔒Confirm your password                                                      👁️‍🗨️">   
<div style="display:flex; align-items:center; gap:8px;">

    <input type="checkbox" style="width:16px; height:15px; margin:0;">

    <label style="margin:0;">
        I agree to the 
        <a href="#">Terms of Service</a> 
        &
        <a href="#">Privacy Policy</a>
    </label>

</div>
<br><br>
<button>Sign Up</button>
</form>
<div class="bottom">
Already have an account?
<a href="kumar 2.html">Login</a>
</div>
</div>
</body>
</html>
