<html>
<head>
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial;
            background-color: lightgray;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box{
            background-color: white;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }
        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .options{
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 15px;
        }
        a{
            text-decoration: none;
            color: blue;
        }
        button{
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
        }
        .signup{
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
         <center><h1>👤</h1></center>
        <h1>Welcome Back</h1>
        <p>Please sign in to your account</p>
        <input type="email" placeholder="📧 Enter Your Email">
        <input type="password" placeholder="🔒 Enter Your Password                              👁️‍🗨️">          
        <div class="options">
            <label>
                <input type="checkbox" style="width:auto;">
                Remember me
            </label>
            <a href="kumar 3.html"> Forgot Password?</a>
        </div>
        <button>Login</button>
        <div class="signup">
            Don't have an account?
            <a href="kumar.html">Sign Up</a>
        </div>
    </div>
</body>
</html>
