<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>

        body{
            font-family: Arial;
            background-color: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box{
            background: white;
            width: 320px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        .icon{
            font-size: 50px;
        }

        h1{
            margin-top: 15px;
        }

        p{
            color: gray;
            font-size: 15px;
        }

        label{
            display: block;
            text-align: left;
            margin-top: 25px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        a{
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: blue;
        }

    </style>
</head>

<body>

    <div class="box">

        <div class="icon"></div>
        <center><h1>👤</h1></center>

        <h1>Forgot Password?</h1>

        <p>
            No worries! Enter your email and we'll
            send you a link to reset your password.
        </p>

        <label>Email</label>

        <input type="email" placeholder="📧 Enter your email">

        <button>Send Reset Link</button>
        <a href="kumar 2.html">Back to login</a>

    </div>

</body>
</html>
