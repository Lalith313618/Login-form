<!DOCTYPE html>
<html>
<head>
</head>
<body>
<style>
.input-box {
  position: relative;
  width: 400px;
  margin: 50px;
}

.input-box input {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: 2px solid #1e3a8a;
  border-radius: 5px;
  outline: none;
}

.input-box input::placeholder {
  color: transparent;
}

.input-box input:focus::placeholder {
  color: #999;
}

.input-box label {
  position: absolute;
  left: 15px;
  top: 16px;
  color: #666;
  background: white;
  padding: 0 5px;
  transition: 0.3s ease;
  pointer-events: none;
}
.input-box input:focus + label,
.input-box input:valid + label {
  top: -10px;
  left: 10px;
  font-size: 15px;
  color: #1e3a8a;
}
</style>
<div class="input-box">
  <input type="text" id="userid"placeholder="Enter your username" required>
  <label for="userid">User ID</label>

</div>
</div>
</body>
</html>
